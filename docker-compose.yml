version: '3.9'
services:
  db:
    image: postgres:15
    container_name: consulta_SQL
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - minha-rede-bpo-financeiro
    restart: 'always'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    cap_add:
      - SYS_NICE
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    image: bpo-financeiro-api:1.0.0
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minha-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "3006:3006"
    networks:
      - minha-rede-bpo-financeiro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meu-frontend
    ports:
      - "8080:8080"
    networks:
      - minha-rede-bpo-financeiro
    depends_on:
      - api

networks:
  minha-rede-bpo-financeiro:
    driver: bridge
volumes:
  db_data: