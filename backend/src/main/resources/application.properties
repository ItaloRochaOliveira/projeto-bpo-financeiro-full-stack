# Server Configuration
server.port=3006
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:consulta_sql}
spring.datasource.username=${POSTGRES_USER:italo}
spring.datasource.password=${POSTGRES_PASSWORD:Senha@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=meu_secret_super_secreto_aqui_pelo_menos_256_bits_e_agora_com_mais_de_64_caracteres_para_ser_seguro
jwt.expiration=86400000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:8080,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.italo.geradorboleto=DEBUG
logging.level.org.springframework.security=DEBUG
